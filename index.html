<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder Agent</title><link rel="stylesheet" href="css/main.css">

</head>
<body><header class="header">
    <h1>Folder Agent</h1>
    <p>Build Websites By Chat</p>
</header>

<section class="hero">

    <button id="createProjectBtn">
        + Create Project
    </button>

    <button id="connectDriveBtn">
        Connect Google Drive
    </button>
    
</section>

<section class="projects-section">
    <h2>Recent Projects</h2>

    <div id="projectsList">
    </div>
</section>

<section
    id="workspaceScreen"
    class="hidden"
>

    <div class="workspace-header">

        <h2 id="workspaceProjectName">
            Project
        </h2>

        <p id="workspaceFolderPath">
            No Folder Connected
        </p>

    </div>

    <div class="workspace-actions">

        <button id="scanProjectBtn">
            Scan Project
        </button>

    </div>

    <div id="projectSummary">

        Project Summary Will Appear Here

    </div>

    <!-- Gemini Chat -->

    <div class="chat-section">

        <h3>Gemini Chat</h3>

        <input
            type="password"
            id="geminiApiKey"
            placeholder="Gemini API Key"
        >

        <textarea
            id="promptInput"
            placeholder="Type Your Prompt..."
        ></textarea>

        <button id="sendPromptBtn">
            Send To Gemini
        </button>

        <div id="geminiResponse">

            Gemini Response Will Appear Here

        </div>

    </div>

</section>

<div
    id="projectModal"
    class="modal hidden"
>

    <div class="modal-content">

        <h3>Create Project</h3>

        <input
            type="text"
            id="projectName"
            placeholder="Project Name"
        >

        <button id="saveProjectBtn">
            Create
        </button>

    </div>

</div>

<script src="js/storage.js"></script>
<script src="js/folder-access.js"></script>
<script src="js/folder-scanner.js"></script>
<script src="js/gemini-api.js"></script>
<script src="js/agent.js"></script>
<script src="js/file-writer.js"></script>
<script src="js/real-folder-access.js"></script>
<script src="js/project-builder.js"></script>
<script src="js/code-generator.js"></script>
<script src="js/activity-log.js"></script>
<script src="js/project-reopen.js"></script>
<script src="js/google-drive-auth.js"></script>
<script src="js/google-drive-api.js"></script>
<script src="js/google-drive-writer.js"></script>
<script src="js/app.js"></script>

</body>
</html>
